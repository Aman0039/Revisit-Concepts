<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main>
        <h1>Calculator</h1>
        <div class="calculator">
            <div class="container">
                <div class="display">
                    <div id="input"></div>
                </div>
                <div class="dial">
                    <button class="key" id="clear">Clear</button>

                    <button class="key" id="equal">=</button>
                    <button class="key" id="mul">*</button>
                    <button class="key" id="sub">-</button>

                    <button class="key" id="key7">7</button>
                    <button class="key" id="key8">8</button>
                    <button class="key" id="key9">9</button>
                    <button class="key" id="add">+</button>

                    <button class="key" id="key4">4</button>
                    <button class="key" id="key5">5</button>
                    <button class="key" id="key6">6</button>

                    <button class="key" id="divide">/</button>
                    <button class="key" id="key3">3</button>
                    <button class="key" id="key2">2</button>

                    <button class="key" id="key1">1</button>
                    <button class="key" id="key0">0</button>
                </div>
            </div>
        </div>
    </main>
</body>
<script src="app.js"></script>

</html>
