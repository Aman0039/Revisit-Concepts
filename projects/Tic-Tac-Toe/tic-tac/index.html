<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="mystyle.css" />
</head>

<body>
    <main>
        <div class="result hide">
            <h2 id="msg">Congrats You Won</h2>
            <button id="newgame-btn">New Game</button>
        </div>

        <div class="game">
            <h1 id="heading">Tic Tac Toe</h1>
            <div class="container">
                <button class="box" id="box1"></button>
                <button class="box" id="box2"></button>
                <button class="box hideright" id="box3"></button>
                <button class="box" id="box4"></button>
                <button class="box" id="box5"></button>
                <button class="box hideright" id="box6"></button>
                <button class="box hidebottom" id="box7"></button>
                <button class="box hidebottom" id="box8"></button>
                <button class="box hideright hidebottom" id="box9"></button>
            </div>
            <button id="reset-btn">Reset</button>
        </div>
    </main>
</body>
<script src="app.js"></script>

</html>
